name: S1000D Weekly Brief

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate brief
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python generate_brief.py

      - name: Commit and push
        run: |
          git config user.name "S1000D Brief Bot"
          git config user.email "brief-bot@users.noreply.github.com"
          git add index.html .issue_number
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly brief $(date +'%Y-%m-%d')"
            git push
          fi
